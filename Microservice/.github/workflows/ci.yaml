name: Nerve IDP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nerve-idp

jobs:
  # ─────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — lint, type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────
  # Gateway — lint, type-check, test
  # ─────────────────────────────────────────
  gateway:
    name: Gateway — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/gateway

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: nerve_test
          POSTGRES_USER: nerve
          POSTGRES_PASSWORD: nerve_test_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/
          ruff format --check app/

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nerve:nerve_test_secret@localhost:5432/nerve_test
          DATABASE_URL_MIGRATIONS: postgresql+psycopg2://nerve:nerve_test_secret@localhost:5432/nerve_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/gateway/coverage.xml
          flags: gateway

  # ─────────────────────────────────────────
  # OPA policy tests
  # ─────────────────────────────────────────
  opa-policies:
    name: OPA — policy unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run policy tests
        run: opa test policies/rego/ -v

      - name: Validate Gatekeeper templates
        run: |
          for f in policies/gatekeeper/*.yaml; do
            echo "Validating $f..."
            cat "$f" | python3 -c "import sys,yaml; yaml.safe_load(sys.stdin.read()); print('OK')"
          done

  # ─────────────────────────────────────────
  # OpenAPI contract validation
  # Ensures the committed spec matches the
  # schema FastAPI generates from Pydantic models.
  # ─────────────────────────────────────────
  contract-validation:
    name: OpenAPI contract validation
    runs-on: ubuntu-latest
    needs: [gateway]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend/gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml

      - name: Start gateway in test mode
        env:
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Fetch generated OpenAPI schema
        run: curl -s http://localhost:8000/api/v1/openapi.json > generated.json

      - name: Compare against committed spec
        run: |
          python3 -c "
          import yaml, json
          with open('../../docs/openapi.yaml') as f:
              committed = yaml.safe_load(f)
          with open('generated.json') as f:
              generated = json.load(f)
          # Compare paths and schemas (not metadata like servers)
          assert committed['paths'].keys() == generated['paths'].keys(), \
              f'Path mismatch: committed={set(committed[\"paths\"].keys()) - set(generated[\"paths\"].keys())} generated={set(generated[\"paths\"].keys()) - set(committed[\"paths\"].keys())}'
          print('Contract validation passed — committed spec matches generated schema')
          "

  # ─────────────────────────────────────────
  # Docker build and push (main branch only)
  # ─────────────────────────────────────────
  docker-build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [frontend, gateway, opa-policies]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for gateway
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: backend/gateway
          file: backend/gateway/Dockerfile
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

  # ─────────────────────────────────────────
  # ArgoCD sync trigger (main branch only)
  # ─────────────────────────────────────────
  argocd-sync:
    name: Trigger ArgoCD sync
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger ArgoCD app sync
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/nerve-idp-dev/sync" \
            -d '{"revision": "${{ github.sha }}"}'
